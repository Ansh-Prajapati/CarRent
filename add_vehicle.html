{% extends "base.html" %}

{% block title %}Add Vehicle — Admin{% endblock %}

{% block content %}
<div class="page-header">
    <div class="container">
        <div>
            <h1>Add New Vehicle</h1>
            <p class="breadcrumb">
                <a href="{{ url_for('admin_dashboard') }}" style="color:var(--primary)">Dashboard</a>
                &rsaquo; <a href="{{ url_for('admin_vehicles') }}" style="color:var(--primary)">Vehicles</a>
                &rsaquo; <span>Add</span>
            </p>
        </div>
    </div>
</div>

<div class="page-content">
    <div class="container">
        <div style="max-width: 760px; margin: 0 auto;">
            <div class="admin-section">
                <div class="admin-section-header">
                    <h2>Vehicle Details</h2>
                </div>

                <form method="POST" id="add-vehicle-form">
                    <!-- Basic Info -->
                    <h3 style="font-size: 1rem; margin: 20px 0 10px; color: var(--primary);">Basic Information</h3>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="model">Model <span style="color:var(--danger)">*</span></label>
                            <input type="text" id="model" name="model" required placeholder="e.g. Toyota Camry">
                        </div>
                        <div class="form-group">
                            <label for="year">Year <span style="color:var(--danger)">*</span></label>
                            <input type="number" id="year" name="year" min="2000" max="2026" required placeholder="2024">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="type">Vehicle Type <span style="color:var(--danger)">*</span></label>
                            <select id="type" name="type" required>
                                <option value="">Select Type</option>
                                <option value="Sedan">Sedan</option>
                                <option value="SUV">SUV</option>
                                <option value="Hatchback">Hatchback</option>
                                <option value="Electric">Electric</option>
                                <option value="Sports">Sports</option>
                                <option value="MPV">MPV</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="daily_rate">Daily Rate (₹) <span style="color:var(--danger)">*</span></label>
                            <input type="number" id="daily_rate" name="daily_rate" min="1" step="1" required placeholder="e.g. 2500">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="location">Location <span style="color:var(--danger)">*</span></label>
                        <select id="location" name="location" required>
                            <option value="">Select Location</option>
                            <option value="Mumbai">Mumbai</option>
                            <option value="Delhi">Delhi</option>
                            <option value="Bangalore">Bangalore</option>
                            <option value="Chennai">Chennai</option>
                            <option value="Pune">Pune</option>
                            <option value="Hyderabad">Hyderabad</option>
                            <option value="Kolkata">Kolkata</option>
                        </select>
                    </div>

                    <!-- Detailed Specifications -->
                    <h3 style="font-size: 1rem; margin: 25px 0 10px; color: var(--primary);">Detailed Specifications</h3>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="variant">Variant</label>
                            <input type="text" id="variant" name="variant" placeholder="e.g. ZX, VX, Sport">
                        </div>
                        <div class="form-group">
                            <label for="fuel_type">Fuel Type</label>
                            <select id="fuel_type" name="fuel_type">
                                <option value="Petrol">Petrol</option>
                                <option value="Diesel">Diesel</option>
                                <option value="Electric">Electric</option>
                                <option value="Hybrid">Hybrid</option>
                                <option value="CNG">CNG</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="transmission">Transmission</label>
                            <select id="transmission" name="transmission">
                                <option value="Manual">Manual</option>
                                <option value="Automatic">Automatic</option>
                                <option value="CVT">CVT</option>
                                <option value="DCT">DCT</option>
                                <option value="DSG">DSG</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="seating_capacity">Seating Capacity</label>
                            <input type="number" id="seating_capacity" name="seating_capacity" min="2" max="9" value="5">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="km_driven">KM Driven</label>
                            <input type="number" id="km_driven" name="km_driven" min="0" placeholder="e.g. 15000">
                        </div>
                        <div class="form-group">
                            <label for="engine_cc">Engine (CC)</label>
                            <input type="text" id="engine_cc" name="engine_cc" placeholder="e.g. 1498cc">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="mileage">Mileage (km/l)</label>
                            <input type="text" id="mileage" name="mileage" placeholder="e.g. 18 km/l">
                        </div>
                        <div class="form-group">
                            <label for="color">Color</label>
                            <input type="text" id="color" name="color" placeholder="e.g. Pearl White">
                        </div>
                    </div>

                    <!-- Description & Image -->
                    <div class="form-group">
                        <label for="description">Description</label>
                        <textarea id="description" name="description" rows="5"
                                  placeholder="Describe the vehicle — features, condition, amenities, special highlights..."></textarea>
                    </div>

                    <div class="form-group">
                        <label for="image_url">Image URL <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--mid-grey)">(optional)</span></label>
                        <input type="url" id="image_url" name="image_url"
                               placeholder="https://example.com/image.jpg or images/car.png">
                        <small>Paste a direct image URL or a path relative to the static folder.</small>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-success btn-lg" id="add-vehicle-btn">➕ Add Vehicle</button>
                        <a href="{{ url_for('admin_vehicles') }}" class="btn btn-secondary btn-lg">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
