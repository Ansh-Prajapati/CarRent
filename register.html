{% extends "base.html" %}

{% block title %}Register — CRS{% endblock %}

{% block content %}
<div class="form-page">
    <div class="form-container" style="max-width: 560px;">
        <div class="form-header">
            <div class="form-icon">📋</div>
            <h2>Create Account</h2>
            <p>Join CRS and start renting your perfect vehicle today</p>
        </div>

        <form method="POST" id="register-form">
            <div class="form-row">
                <div class="form-group">
                    <label for="full_name">Full Name <span style="color:var(--danger)">*</span></label>
                    <input type="text" id="full_name" name="full_name" required placeholder="Your full name" autocomplete="name">
                </div>
                <div class="form-group">
                    <label for="username">Username <span style="color:var(--danger)">*</span></label>
                    <input type="text" id="username" name="username" required placeholder="Choose a username" autocomplete="username">
                </div>
            </div>

            <div class="form-group">
                <label for="email">Email Address <span style="color:var(--danger)">*</span></label>
                <input type="email" id="email" name="email" required placeholder="you@example.com" autocomplete="email">
            </div>

            <div class="form-group">
                <label for="phone">Phone Number <span style="color:var(--danger)">*</span></label>
                <input type="tel" id="phone" name="phone" required placeholder="+91 XXXXX XXXXX" autocomplete="tel">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="password">Password <span style="color:var(--danger)">*</span></label>
                    <input type="password" id="password" name="password" required placeholder="Create a password" autocomplete="new-password">
                </div>
                <div class="form-group">
                    <label for="confirm_password">Confirm Password <span style="color:var(--danger)">*</span></label>
                    <input type="password" id="confirm_password" name="confirm_password" required placeholder="Repeat password" autocomplete="new-password">
                </div>
            </div>

            

            <button type="submit" class="btn btn-primary btn-block btn-lg" id="register-btn">
                Create My Account
            </button>
        </form>

        <div class="form-footer">
            Already have an account? <a href="{{ url_for('login') }}">Login here</a>
        </div>
    </div>
</div>
{% endblock %}
